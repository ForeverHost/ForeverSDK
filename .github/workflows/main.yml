name: Run Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23' 

    - name: Install dependencies
      run: npm install

    - name: Run test * package
      run: npx ts-node -r tsconfig-paths/register tests/test_package.ts
